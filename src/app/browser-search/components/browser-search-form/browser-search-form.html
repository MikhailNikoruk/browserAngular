<div class="search-form">
    <input
        class="search-field"
        [(ngModel)]="query"
        type="text"
        placeholder="Введите запрос"
    >

    @if (query) {
        <button
            class="form-button"
            (click)="reset()"
        >
            X
        </button>
    }

    <button
        class="form-button"
        (click)="submit()"
    >
        Найти
    </button>
</div>
