<div class="data-list">
    @for (dataItem of dataList(); track dataItem.id || $index) {
        <div class="data-item">
            <div class="data-item__header">
                <div class="data-item__position">
                    {{ $index + 1 }}
                </div>

                <span class="data-item__title">
                    {{ dataItem.title }}
                </span>
            </div>

            @if (dataItem.link) {
                <a [href]="dataItem.link" target="_blank" rel="noreferrer">
                    {{ dataItem.link }}
                </a>
            } @else {
                <span class="data-item__link data-item__link--muted">Ссылка недоступна</span>
            }

            <div class="data-item__category">
                {{ dataItem.category }}
            </div>

            <div class="data-item__text">
                {{ dataItem.text }}
            </div>
        </div>
    }
</div>
